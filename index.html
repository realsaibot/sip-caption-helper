<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Caption Helper">
  <meta name="theme-color" content="#0b0c10">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="builder.css">
  <title>Caption Builder</title>
</head>
<body>

<header class="top">
  <div>
    <div class="title">Caption Builder</div>
    <div class="sub">Click names in left → right order.</div>
  </div>
  <div class="topBtns">
    <button id="openOptions" class="iconBtn" title="Options">⚙️ Options</button>
  </div>
</header>

<div class="layout">
  <section class="panel">
    <div class="panelHeader">
      <div class="panelTitle">People</div>
      <div class="panelMeta"><span id="count">0</span></div>
    </div>

    <div class="searchRow">
      <input id="search" placeholder="Search name or category…" autocomplete="off">
      <button id="clearSearch" class="iconBtn" title="Clear">✕</button>
    </div>

    <div id="peopleList" class="list"></div>
    <div id="emptyState" class="empty hidden">No matches. Add entries in Options ⚙️.</div>
  </section>

  <section class="panel">
    <div class="panelHeader">
      <div class="panelTitle">Selection</div>
      <div class="panelMeta"><span id="selCount">0</span></div>
    </div>

    <div id="selection" class="selection"></div>

    <div class="actions">
      <button id="copyBtn" class="btn btn-primary" disabled>Copy caption</button>
      <button id="clearBtn" class="btn btn-ghost" disabled>Clear</button>
    </div>

    <label class="chk">
      <input type="checkbox" id="prefixToggle">
      Prefix: "De gauche à droite :"
    </label>

    <div id="toast" class="toast hidden"></div>
  </section>
</div>

<script src="builder.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
